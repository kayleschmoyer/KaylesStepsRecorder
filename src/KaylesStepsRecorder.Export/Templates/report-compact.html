<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{TITLE}}</title>
<style>
body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #fff; color: #1a202c; padding: 24px; max-width: 900px; margin: 0 auto; line-height: 1.5;
}
h1 { font-size: 1.6em; color: #2d3748; border-bottom: 2px solid #edf2f7; padding-bottom: 8px; margin-bottom: 16px; }
.header-meta { display: flex; gap: 20px; font-size: 0.85em; color: #718096; margin-bottom: 24px; flex-wrap: wrap; }
.header-meta span { background: #edf2f7; padding: 4px 10px; border-radius: 4px; }
ol.steps { list-style: none; counter-reset: step; padding: 0; }
ol.steps li {
    counter-increment: step;
    padding: 14px 0 14px 48px;
    position: relative;
    border-bottom: 1px solid #edf2f7;
}
ol.steps li::before {
    content: counter(step);
    position: absolute;
    left: 0;
    top: 14px;
    background: #667eea;
    color: #fff;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85em;
}
.step-desc { font-weight: 500; color: #2d3748; }
.step-time { font-size: 0.8em; color: #a0aec0; margin-left: 8px; }
.step-thumb { margin-top: 8px; max-width: 400px; border: 1px solid #e2e8f0; border-radius: 6px; }
.step-thumb img { width: 100%; display: block; }
.footer { text-align: center; padding: 24px 0 0; color: #a0aec0; font-size: 0.8em; margin-top: 24px; border-top: 1px solid #edf2f7; }
</style>
</head>
<body>
<h1>{{BUG_TITLE}}</h1>
<div class="header-meta">{{META_BADGES}}</div>
<ol class="steps">
    {{STEPS}}
</ol>
<div class="footer">Generated by Kayle's Steps Recorder &bull; {{GENERATED_AT}}</div>
</body>
</html>
